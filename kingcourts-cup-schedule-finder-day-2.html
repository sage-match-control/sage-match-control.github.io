<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Cup S1 — Day 1 Match Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --court:#C9A227;
    --court-dark:#0A1424;
    --court-line:#F1E7C8;
    --ink:#141B2C;
    --paper:#FBF7EC;
    --amber:#F0CB5C;
    --cork:#8E1F3B;
    --muted:#6B7690;
    --navy-mid:#122548;
    --card-shadow: 0 18px 40px -20px rgba(5,12,26,.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(900px 480px at 50% -12%, rgba(201,162,39,.16), transparent 62%),
      radial-gradient(700px 420px at 100% 0%, rgba(201,162,39,.08), transparent 55%),
      linear-gradient(180deg, var(--court-dark) 0%, #0D1B33 45%, var(--court-dark) 100%);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 20px 90px;}

  /* ---------- HERO ---------- */
  header.hero{
    padding:52px 20px 40px;
    text-align:center;
    color:var(--court-line);
    position:relative;
  }
  .crown-mark{
    width:34px; height:34px;
    margin:0 auto 14px;
    color:var(--amber);
    filter:drop-shadow(0 2px 6px rgba(240,203,92,.35));
  }
  .regal-rule{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    max-width:280px;
    margin:0 auto 30px;
  }
  .regal-rule::before, .regal-rule::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(201,162,39,.7));
  }
  .regal-rule::after{ background:linear-gradient(90deg, rgba(201,162,39,.7), transparent); }
  .regal-rule .diamond{
    width:7px; height:7px;
    background:var(--amber);
    transform:rotate(45deg);
    flex-shrink:0;
  }
  .eyebrow{
    font-family:'Cinzel',serif;
    font-weight:600;
    letter-spacing:.32em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--amber);
    margin-bottom:16px;
  }
  h1.title{
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:clamp(38px,8.5vw,68px);
    line-height:1.02;
    letter-spacing:.02em;
    margin:0 0 10px;
    text-transform:uppercase;
    color:var(--court-line);
    text-shadow:0 2px 24px rgba(201,162,39,.18);
  }
  h1.title span{
    color:var(--amber);
    background:linear-gradient(180deg, #F7DE8C, #C9A227);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .subtitle{
    font-size:15px;
    color:rgba(241,231,200,.75);
    max-width:480px;
    margin:0 auto 34px;
    line-height:1.55;
  }

  /* ---------- SEARCH ---------- */
  .search-panel{
    background:var(--paper);
    border-radius:18px;
    padding:22px;
    box-shadow:var(--card-shadow);
    position:relative;
    max-width:560px;
    margin:0 auto;
  }
  .search-panel::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    border:1px solid rgba(201,162,39,.35);
    margin:8px;
    pointer-events:none;
  }
  .search-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:var(--muted);
    display:block;
    margin-bottom:10px;
    text-align:left;
  }
  .search-row{display:flex; gap:10px;}
  input#teamInput{
    flex:1;
    font-family:'IBM Plex Mono',monospace;
    font-size:20px;
    font-weight:600;
    letter-spacing:.03em;
    padding:14px 16px;
    border-radius:10px;
    border:2px solid rgba(20,27,44,.18);
    background:#fff;
    color:var(--ink);
    text-transform:uppercase;
    outline:none;
    min-width:0;
  }
  input#teamInput:focus{border-color:var(--court);}
  input#teamInput::placeholder{color:#9AA3B5; font-weight:500; text-transform:none;}
  button#searchBtn{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:15px;
    padding:0 22px;
    border-radius:10px;
    border:none;
    background:var(--cork);
    color:#fff;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  button#searchBtn:hover{background:#6E1730;}
  button#searchBtn:active{transform:scale(.97);}

  .autocomplete{
    position:relative;
  }
  .ac-list{
    position:absolute;
    left:0; right:0; top:calc(100% + 6px);
    background:#fff;
    border-radius:10px;
    box-shadow:0 14px 30px -12px rgba(0,0,0,.35);
    max-height:220px;
    overflow-y:auto;
    z-index:20;
    display:none;
    text-align:left;
    border:1px solid rgba(20,27,44,.08);
    color:var(--ink);
  }
  .ac-list.show{display:block;}
  .ac-item{
    padding:10px 14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    border-bottom:1px solid rgba(20,27,44,.06);
  }
  .ac-item:last-child{border-bottom:none;}
  .ac-item:hover, .ac-item.active{background:var(--court); color:#fff;}
  .ac-item small{font-family:'Inter',sans-serif; color:var(--muted); opacity:1; font-weight:500;}
  .ac-item:hover small, .ac-item.active small{color:rgba(255,255,255,.85);}

  .sync-status{
    max-width:560px;
    margin:14px auto 0;
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.03em;
    color:rgba(241,231,200,.6);
  }
  .sync-status.ok{color:var(--amber);}
  .sync-status.error{color:#ff9a7a;}
  .sync-status .retry-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    background:none;
    border:1px solid rgba(255,154,122,.5);
    color:#ff9a7a;
    padding:2px 8px;
    border-radius:100px;
    cursor:pointer;
    margin-left:6px;
  }
  .sync-status .retry-btn:hover{background:rgba(255,154,122,.15);}

  .quick-divisions{
    max-width:560px;
    margin:16px auto 0;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--court-line);
    border:1px solid rgba(241,231,200,.32);
    padding:6px 12px;
    border-radius:100px;
    background:rgba(255,255,255,.06);
    cursor:default;
  }

  /* ---------- RESULTS ---------- */
  #results{margin-top:44px;}

  .results-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    color:var(--court-line);
    margin-bottom:18px;
    flex-wrap:wrap;
    gap:8px;
  }
  .results-head h2{
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:28px;
    text-transform:uppercase;
    margin:0;
    letter-spacing:.03em;
  }
  .results-head .division-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--amber);
  }
  .results-meta{
    font-size:13px;
    color:rgba(241,231,200,.7);
    margin:-8px 0 22px;
  }

  .empty-state{
    background:rgba(255,255,255,.06);
    border:1px dashed rgba(241,231,200,.32);
    border-radius:14px;
    padding:26px;
    color:rgba(241,231,200,.85);
    text-align:center;
    font-size:14px;
    line-height:1.6;
  }
  .empty-state strong{color:var(--amber); font-family:'IBM Plex Mono',monospace;}

  .stats-row{
    display:flex;
    gap:14px;
    justify-content:center;
    margin:34px auto 0;
    max-width:560px;
    flex-wrap:wrap;
  }
  .stat{
    background:rgba(255,255,255,.07);
    border:1px solid rgba(241,231,200,.15);
    border-radius:12px;
    padding:14px 18px;
    text-align:center;
    color:var(--court-line);
    min-width:110px;
    flex:1;
  }
  .stat b{
    display:block;
    font-family:'Cinzel',serif;
    font-size:24px;
    color:var(--amber);
    font-weight:700;
  }
  .stat span{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:rgba(241,231,200,.65);}

  /* ---------- TICKET CARD ---------- */
  .ticket{
    background:var(--paper);
    border-radius:16px;
    box-shadow:var(--card-shadow);
    display:flex;
    margin-bottom:16px;
    overflow:hidden;
    position:relative;
    border-left:6px solid var(--court);
  }
  .ticket-body{
    padding:16px 20px 16px 22px;
    flex:1;
    min-width:0;
  }
  .ticket-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    flex-wrap:wrap;
    gap:6px;
  }
  .ticket-time{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:15px;
    color:var(--court);
  }
  .ticket-tags{display:flex; gap:6px; flex-wrap:wrap;}
  .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.06em;
    padding:3px 8px;
    border-radius:100px;
  }
  .tag.match-no{background:rgba(20,27,44,.08); color:var(--muted);}
  .tag.round{background:var(--cork); color:#fff;}
  .tag.pool{background:rgba(201,162,39,.14); color:#8A6A12;}

  .matchup{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .side{flex:1; min-width:0;}
  .side .code{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:14px;
    letter-spacing:.02em;
  }
  .side.you .code{color:var(--cork);}
  .side .players{
    font-size:13.5px;
    color:var(--ink);
    margin-top:2px;
    line-height:1.4;
  }
  .side .players .p{display:block;}
  .side.tbd .players{color:var(--muted); font-style:italic;}
  .vs{
    font-family:'Cinzel',serif;
    font-weight:600;
    font-size:13px;
    color:var(--muted);
    flex-shrink:0;
    padding-top:2px;
  }
  .you-badge{
    display:inline-block;
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:var(--cork);
    color:#fff;
    padding:1px 6px;
    border-radius:4px;
    margin-left:6px;
    vertical-align:middle;
  }

  footer{
    text-align:center;
    color:rgba(241,231,200,.5);
    font-size:12px;
    line-height:1.9;
    margin-top:60px;
    padding-bottom:20px;
    font-family:'IBM Plex Mono',monospace;
  }

  @media (max-width:520px){
    .search-row{flex-direction:column;}
    button#searchBtn{padding:13px;}
  }

  :focus-visible{outline:3px solid var(--amber); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<header class="hero">
  <svg class="crown-mark" viewBox="0 0 48 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M4 34L1 12l10 8 13-16 13 16 10-8-3 22H4Z" fill="currentColor"/>
    <rect x="4" y="34" width="40" height="4" rx="1" fill="currentColor"/>
  </svg>
  <div class="eyebrow">Kingcourts Pickleball &nbsp;·&nbsp; Jul 05, 2026 &nbsp;·&nbsp; Day 2</div>
  <h1 class="title">Royal Cup <span>S1</span></h1>
  <p class="subtitle">Find your team's full match schedule — every round, every opponent, in order.</p>

  <div class="search-panel">
    <label class="search-label" for="teamInput">Enter your team code</label>
    <div class="search-row autocomplete">
      <input id="teamInput" type="text" placeholder="e.g. RMD_1" autocomplete="off" inputmode="latin" />
      <div id="acList" class="ac-list"></div>
      <button id="searchBtn">Find matches</button>
    </div>
  </div>

  <div class="quick-divisions" id="divisionChips"></div>
  <div class="regal-rule"><span class="diamond"></span></div>
  <div id="syncStatus" class="sync-status loading">Loading live schedule from Google Sheets…</div>
</header>

<div class="wrap">
  <div id="results"></div>
</div>

<footer>Kingcourts Pickleball &middot; Royal Cup S1 &middot; Day 2 Schedule<br>Powered by S.A.G.E. Match Control Experts</footer>

<script>
const SHEET_ID = '12pvF12m9F_M0Q6TyWLZ4snNY3xqX82TuM79z5Bv1aDI';
const CSV_GID = '2136121736';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${CSV_GID}`;

let MATCHES = [];

function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\r'){ /* skip */ }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field += c;
    }
  }
  if(field.length>0 || row.length>0){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || r[0] !== '');
}

function rowsToMatches(rows){
  if(rows.length < 2) return [];
  const header = rows[0].map(h => h.trim());
  const idx = name => header.indexOf(name);
  const iNum = idx('matchNumber'), iT1 = idx('teamCode1'), iP1a = idx('team1Player1'),
        iP1b = idx('team1Player2'), iT2 = idx('teamCode2'), iP2a = idx('team2Player1'),
        iP2b = idx('team2Player2'), iSched = idx('Schedule');

  const out = [];
  for(let r = 1; r < rows.length; r++){
    const row = rows[r];
    if(!row || row.length === 0) continue;
    const num = parseInt(row[iNum], 10);
    if(!num) continue;
    const t1 = (row[iT1]||'').trim();
    const t2 = (row[iT2]||'').trim();
    let t1p1 = (row[iP1a]||'').trim();
    let t1p2 = (row[iP1b]||'').trim();
    let t2p1 = (row[iP2a]||'').trim();
    let t2p2 = (row[iP2b]||'').trim();
    // Placeholder bracket slots repeat the team code as the player name
    if(t1p1 === t1 || t1p1 === '') { t1p1 = 'TBD'; t1p2 = 'TBD'; }
    if(t2p1 === t2 || t2p1 === '') { t2p1 = 'TBD'; t2p2 = 'TBD'; }
    out.push({
      num,
      time: (row[iSched]||'').trim(),
      t1, t1p1, t1p2, t2, t2p1, t2p2
    });
  }
  out.sort((a,b) => a.num - b.num);
  return out;
}

async function loadLiveData(){
  const statusEl = document.getElementById('syncStatus');
  statusEl.textContent = 'Loading live schedule from Google Sheets\u2026';
  statusEl.className = 'sync-status loading';
  try {
    const res = await fetch(CSV_URL, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    const matches = rowsToMatches(rows);
    if(matches.length === 0) throw new Error('No rows parsed');
    MATCHES = matches;
    rebuildTeamIndex();
    const now = new Date();
    statusEl.textContent = 'Live \u00b7 synced ' + now.toLocaleTimeString();
    statusEl.className = 'sync-status ok';
    return true;
  } catch(err){
    statusEl.innerHTML = "Couldn't load live data (" + escapeHtml(err.message) + '). <button id="retryBtn" class="retry-btn">Retry</button>';
    statusEl.className = 'sync-status error';
    const retryBtn = document.getElementById('retryBtn');
    if(retryBtn) retryBtn.addEventListener('click', loadLiveData);
    return false;
  }
}

const DIVISIONS = {
  R:  { name: 'Division R',  full: 'Royal' },
  B50: { name: 'Division B50', full: 'Beginner 50+' },
  LI:  { name: 'Division LI',  full: 'Low-Intermediate' },
  O:  { name: 'Division O',  full: 'Open' }
};
const EVENTS = { MD: "Men's Doubles", WD: "Women's Doubles", XD: "Mixed Doubles" };

function parseCode(code){
  const m = code.match(/^(R|B50|LI|O)(MD|WD|XD)_(.+)$/);
  if(!m) return { division:null, event:null, rest: code };
  return { division: m[1], event: m[2], rest: m[3] };
}

function roundLabel(rest){
  if(/^\d+$/.test(rest)) return null; // plain pool team number -> no special tag
  if(rest.includes('R16')) return 'Round of 16';
  if(rest.includes('QF')) return 'Quarterfinal';
  if(rest.includes('SF')) return 'Semifinal';
  if(/^F\d*$|_F\d*$|_F$/.test(rest) || rest === 'F1' || rest === 'F2' || rest.match(/(^|_)F\d*$/)) return 'Final';
  if(/(^|_)B\d*$/.test(rest)) return 'Bronze Match';
  return null;
}

function divisionLabel(code){
  const p = parseCode(code);
  if(!p.division) return null;
  const div = DIVISIONS[p.division];
  const ev = EVENTS[p.event] || '';
  return `${div.name} (${div.full}) · ${ev}`;
}

// Build quick division chips
const chipDefs = ['RMD', 'RXD', 'B50MD', 'LIWD', 'LIMD', 'LIXD', 'OWD', 'OMD', 'OXD'];
const chipsEl = document.getElementById('divisionChips');
chipDefs.forEach(c => {
  const el = document.createElement('span');
  el.className = 'chip';
  el.textContent = c;
  chipsEl.appendChild(el);
});

// Build unique team list for autocomplete (rebuilt whenever MATCHES refreshes)
let allTeams = [];
function rebuildTeamIndex(){
  const teamSet = new Set();
  MATCHES.forEach(m => { teamSet.add(m.t1); teamSet.add(m.t2); });
  allTeams = Array.from(teamSet).sort();
  // Re-run current search/intro against the freshly loaded data
  if(input.value.trim()) runSearch(); else renderIntro();
}

const input = document.getElementById('teamInput');
const acList = document.getElementById('acList');
const resultsEl = document.getElementById('results');
let acIndex = -1;

function renderAutocomplete(query){
  const q = query.trim().toUpperCase();
  if(!q){ acList.classList.remove('show'); acList.innerHTML=''; return; }
  const matches = allTeams.filter(t => t.toUpperCase().includes(q)).slice(0, 8);
  if(matches.length === 0){ acList.classList.remove('show'); acList.innerHTML=''; return; }
  acList.innerHTML = matches.map((t,i) => {
    const label = divisionLabel(t);
    return `<div class="ac-item" data-code="${t}" data-i="${i}"><span>${t}</span>${label ? `<small>${label}</small>` : ''}</div>`;
  }).join('');
  acList.classList.add('show');
  acIndex = -1;
}

input.addEventListener('input', () => renderAutocomplete(input.value));
input.addEventListener('focus', () => renderAutocomplete(input.value));
document.addEventListener('click', (e) => {
  if(!e.target.closest('.autocomplete')) acList.classList.remove('show');
});
acList.addEventListener('click', (e) => {
  const item = e.target.closest('.ac-item');
  if(!item) return;
  input.value = item.dataset.code;
  acList.classList.remove('show');
  runSearch();
});
input.addEventListener('keydown', (e) => {
  const items = Array.from(acList.querySelectorAll('.ac-item'));
  if(e.key === 'ArrowDown' && items.length){
    e.preventDefault();
    acIndex = Math.min(acIndex+1, items.length-1);
    items.forEach(it=>it.classList.remove('active'));
    items[acIndex].classList.add('active');
    input.value = items[acIndex].dataset.code;
  } else if(e.key === 'ArrowUp' && items.length){
    e.preventDefault();
    acIndex = Math.max(acIndex-1, 0);
    items.forEach(it=>it.classList.remove('active'));
    items[acIndex].classList.add('active');
    input.value = items[acIndex].dataset.code;
  } else if(e.key === 'Enter'){
    acList.classList.remove('show');
    runSearch();
  } else if(e.key === 'Escape'){
    acList.classList.remove('show');
  }
});
document.getElementById('searchBtn').addEventListener('click', runSearch);

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function ticketHTML(m, teamCode){
  const isT1 = m.t1 === teamCode;
  const you = isT1 ? {code:m.t1, p1:m.t1p1, p2:m.t1p2} : {code:m.t2, p1:m.t2p1, p2:m.t2p2};
  const opp = isT1 ? {code:m.t2, p1:m.t2p1, p2:m.t2p2} : {code:m.t1, p1:m.t1p1, p2:m.t1p2};
  const youTBD = you.p1 === 'TBD';
  const oppTBD = opp.p1 === 'TBD';
  const oppRound = roundLabel(parseCode(opp.code).rest);
  const tag = oppRound
    ? `<span class="tag round">${oppRound}</span>`
    : `<span class="tag pool">Pool Play</span>`;

  return `
  <div class="ticket">
    <div class="ticket-body">
      <div class="ticket-top">
        <span class="ticket-time">${escapeHtml(m.time)}</span>
        <div class="ticket-tags">
          <span class="tag match-no">Match #${m.num}</span>
          ${tag}
        </div>
      </div>
      <div class="matchup">
        <div class="side you ${youTBD ? 'tbd':''}">
          <div class="code">${escapeHtml(you.code)}<span class="you-badge">You</span></div>
          <div class="players">${youTBD ? 'To be determined' : `<span class="p">${escapeHtml(you.p1)}</span><span class="p">${escapeHtml(you.p2)}</span>`}</div>
        </div>
        <div class="vs">VS</div>
        <div class="side ${oppTBD ? 'tbd':''}">
          <div class="code">${escapeHtml(opp.code)}</div>
          <div class="players">${oppTBD ? 'To be determined' : `<span class="p">${escapeHtml(opp.p1)}</span><span class="p">${escapeHtml(opp.p2)}</span>`}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function runSearch(){
  const raw = input.value.trim();
  if(!raw){
    renderIntro();
    return;
  }
  const code = raw.toUpperCase();
  const teamMatches = MATCHES.filter(m => m.t1 === code || m.t2 === code)
                              .sort((a,b) => a.num - b.num);

  if(teamMatches.length === 0){
    // suggest close matches
    const suggestions = allTeams.filter(t => t.toUpperCase().startsWith(code.split('_')[0])).slice(0,6);
    resultsEl.innerHTML = `
      <div class="empty-state">
        No matches found for <strong>${escapeHtml(code)}</strong>.<br>
        Double-check the code (e.g. <strong>RMD_1</strong>, <strong>LIWD_3</strong>, <strong>AXD_7</strong>).
        ${suggestions.length ? `<br><br>Did you mean: ${suggestions.map(s=>`<strong>${s}</strong>`).join(', ')}?` : ''}
      </div>`;
    return;
  }

  const label = divisionLabel(code);
  resultsEl.innerHTML = `
    <div class="results-head">
      <h2>${escapeHtml(code)}</h2>
      ${label ? `<span class="division-tag">${label}</span>` : ''}
    </div>
    <div class="results-meta">${teamMatches.length} match${teamMatches.length>1?'es':''} found, in schedule order</div>
    ${teamMatches.map(m => ticketHTML(m, code)).join('')}
  `;
}

function renderIntro(){
  const teams = new Set();
  const divisions = new Set();
  MATCHES.forEach(m => { [m.t1, m.t2].forEach(c => { teams.add(c); const p = parseCode(c); if(p.division && p.event) divisions.add(p.division+p.event); }); });
  resultsEl.innerHTML = `
    <div class="stats-row">
      <div class="stat"><b>${MATCHES.length || '—'}</b><span>Matches</span></div>
      <div class="stat"><b>${teams.size || '—'}</b><span>Teams</span></div>
      <div class="stat"><b>${divisions.size || '—'}</b><span>Divisions</span></div>
    </div>`;
}

renderIntro();
loadLiveData();
</script>
</body>
</html>
